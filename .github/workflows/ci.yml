name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

# ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y make cmake doxygen g++

      - name: Build project
        run: |
          mkdir -p build
          cd build
          cmake ..
          make

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/

# ---------------- TEST ----------------
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build/

      - name: Fix permissions
        run: chmod +x ./build/test/unit_test

      - name: Run tests
        run: ./build/test/unit_test

# ---------------- DOCKER ----------------
  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build/

      - name: Build Docker image
        run: docker build -t my-image .

# ---------------- DOCS ----------------
  docs:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install doxygen
        run: sudo apt update && sudo apt install -y doxygen

      - name: Generate docs
        run: |
          doxygen Doxyfile
          mv docs/html public/