name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y make autoconf cmake doxygen

      - name: Build
        run: |
          mkdir -p build
          cd build
          cmake ..
          make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: build/

  test-linux:
    runs-on: ubuntu-latest
    needs: build-linux

    steps:
      - uses: actions/checkout@v4

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-linux
          path: build/

      - name: Run tests
        run: ./build/test/unit_test

  build-docker:
    runs-on: ubuntu-latest
    needs: build-linux
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-image .

  docs:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install doxygen
        run: sudo apt update && sudo apt install -y doxygen

      - name: Generate docs
        run: |
          doxygen Doxyfile
          mv docs/html public/